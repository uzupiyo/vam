        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#49e6ff" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#40cfff" stop-opacity="0.45"/>
      <stop offset="0.7" stop-color="#1688ff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0654e8" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="starFill" cx="50%" cy="50%" r="60%">
