<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Asset Preview</title>
<style>
body{background:#0b1220;color:#fff;font-family:monospace;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.card{background:#152238;border:1px solid #39d9ff;border-radius:12px;padding:12px;text-align:center}
.card img{max-width:120px;max-height:120px;image-rendering:pixelated;background:#20304a}
.bg img{max-width:320px;max-height:180px}
</style>
</head>
<body>
<h1>RIN SURVIVORS Asset Preview</h1>
<div class="grid">
<div class="card"><h3>Rin</h3><img src="assets/player/rin/idle/frame_01.png"></div>
<div class="card"><h3>slime</h3><img src="assets/enemies/slime/frame_01.png"></div>
<div class="card"><h3>bat</h3><img src="assets/enemies/bat/frame_01.png"></div>
<div class="card"><h3>golem</h3><img src="assets/enemies/golem/frame_01.png"></div>
<div class="card"><h3>boss</h3><img src="assets/enemies/boss/frame_01.png"></div>
<div class="card"><h3>magnet</h3><img src="assets/items/magnet.png"></div>
<div class="card"><h3>heal</h3><img src="assets/items/heal_cross.png"></div>
<div class="card"><h3>barrier</h3><img src="assets/items/barrier_shield.png"></div>
<div class="card"><h3>weapon</h3><img src="assets/items/rin_dual_pistols.png"></div>
<div class="card bg"><h3>background</h3><img src="assets/backgrounds/rin_city_plaza_field.png"></div>
</div>
</body>
</html>
